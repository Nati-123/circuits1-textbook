site_name: Circuits 1 Interactive Textbook

theme:
  name: material
  palette:
    primary: deep purple
    accent: amber
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - toc.integrate
    - content.tabs.link

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css: []

nav:
  - Home: index.md
  - Chapters:
    - Chapter 1: chapters/ch1.md
    - Chapter 2: chapters/ch2.md
    - Chapter 3:
      - Content: chapters/ch3.md
      - Quiz: chapters/ch3-quiz.md
      - Problems: chapters/ch3-problems.md
      - Glossary: chapters/ch3-glossary.md
      - References: chapters/ch3-references.md
    - Chapter 4: chapters/ch4.md
    - Chapter 7 - Second-Order RLC Circuits:
      - Content: chapters/ch7.md
      - RLC Circuit Simulator: sims/rlc-circuit/index.md
      - Natural Frequency Calculator: sims/natural-frequency-calculator/index.md
