site_name: Circuits 1 Interactive Textbook

theme:
  name: material
  palette:
    primary: deep purple
    accent: amber
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - toc.integrate
    - content.tabs.link

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Chapters:
    - Chapter 1 - Electric Charge and Basic Quantities: chapters/ch1.md
    - Chapter 2 - Ohm's Law and Basic Configurations: chapters/ch2.md
    - Chapter 3 - Kirchhoff's Laws and Circuit Topology:
      - Content: chapters/ch3.md
      - Quiz: chapters/ch3-quiz.md
      - Problems: chapters/ch3-problems.md
      - Glossary: chapters/ch3-glossary.md
      - References: chapters/ch3-references.md
    - Chapter 4 - DC Circuit Analysis Methods: chapters/ch4.md
    - Chapter 5 - Passive Components: chapters/ch5.md
    - Chapter 6 - Transient Analysis RC and RL: chapters/ch6.md
    - Chapter 7 - Second-Order RLC Circuits: chapters/ch7.md
    - Chapter 8 - AC Signals and Sinusoidal Waveforms: chapters/ch8.md
    - Chapter 9 - Phasors and Complex Impedance: chapters/ch9.md
    - Chapter 10 - AC Power Analysis: chapters/ch10.md
    - Chapter 11 - Frequency Response and Bode Plots: chapters/ch11.md
    - Chapter 12 - Filters and Resonance: chapters/ch12.md
    - Chapter 13 - Operational Amplifiers: chapters/ch13.md
    - Chapter 14 - Signal Analysis and Fourier Series: chapters/ch14.md
    - Chapter 15 - Audio Applications and Amplifiers: chapters/ch15.md
    - Chapter 16 - Laboratory Measurement Techniques: chapters/ch16.md
  - MicroSims:
    - RLC Circuit Simulator: sims/rlc-circuit/index.md
    - Natural Frequency Calculator: sims/natural-frequency-calculator/index.md
    - Overdamped Response: sims/overdamped-response/main.html
    - Underdamped Oscillation: sims/underdamped-oscillation/main.html
    - Damping Comparison: sims/damping-comparison/main.html
    - Series RLC Resonance: sims/series-resonance/main.html
    - Quality Factor & Bandwidth: sims/quality-factor/main.html
    - Pulse Response & Ringing: sims/pulse-ringing/main.html
    - Energy Exchange in RLC: sims/energy-exchange/main.html
