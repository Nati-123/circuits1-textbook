  body { font-family: 'Segoe UI', Roboto, sans-serif; background: transparent; overflow: hidden; }
  svg { display: block; width: 100%; height: 100%; }
  .node { cursor: pointer; transition: opacity 0.3s; }
  .node rect, .node circle { transition: filter 0.3s, stroke-width 0.3s; }

  .faded { opacity: 0.15; }
  .highlighted rect, .highlighted circle { filter: drop-shadow(0 0 10px rgba(90,62,237,0.35)); stroke-width: 3; }
  .edge.highlighted { opacity: 1; stroke-width: 3 !important; }
  .tooltip {
    position: fixed; background: #333; color: #fff; padding: 6px 12px;
    border-radius: 6px; font-size: 12px; pointer-events: none;
    opacity: 0; transition: opacity 0.2s; z-index: 100; white-space: nowrap;

  }
  .tooltip.show { opacity: 1; }

  <text x="380" y="312" text-anchor="middle" font-size="9.5" fill="#999" font-style="italic">linearity</text>
  <text x="672" y="360" text-anchor="start" font-size="9.5" fill="#B8860B" font-style="italic" transform="rotate(90,672,360)">enables</text>

<script>
const nodes = document.querySelectorAll('.node');
const edges = document.querySelectorAll('.edge');
const tip = document.getElementById('tip');

// Adjacency: which nodes connect to which
const adj = {};
edges.forEach(e => {
  const f = e.dataset.from, t = e.dataset.to;
  if (!adj[f]) adj[f] = new Set();
  if (!adj[t]) adj[t] = new Set();
  adj[f].add(t); adj[t].add(f);
});

function getNeighbors(id) {
  return adj[id] || new Set();
}

nodes.forEach(node => {
  const id = node.dataset.id;

  node.addEventListener('mouseenter', (e) => {
    const neighbors = getNeighbors(id);
    // Fade everything
    nodes.forEach(n => { if (n.dataset.id !== id && !neighbors.has(n.dataset.id)) n.classList.add('faded'); else n.classList.add('highlighted'); });
    edges.forEach(edge => {
      if (edge.dataset.from === id || edge.dataset.to === id) edge.classList.add('highlighted');
      else edge.classList.add('faded');
    });
    node.classList.remove('faded');
    node.classList.add('active');
    // Tooltip
    tip.textContent = node.dataset.tip;
    tip.classList.add('show');
  });

  node.addEventListener('mousemove', (e) => {
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 30) + 'px';
  });

  node.addEventListener('mouseleave', () => {
    nodes.forEach(n => { n.classList.remove('faded', 'highlighted', 'active'); });
    edges.forEach(e => { e.classList.remove('faded', 'highlighted'); });
    tip.classList.remove('show');
  });

  node.addEventListener('click', () => {
    const href = node.dataset.href;
    if (href) {
      if (href.startsWith('#')) {
        // Section link — navigate parent page
        window.parent.location.hash = href;
      } else {
        window.open(href, '_blank');
      }
    }
  });
});
</script>
</body>
</html>
